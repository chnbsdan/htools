<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="HTools is a curated directory of open-source tools for builders."
    />
    <link rel="icon" href="/favicon.ico" sizes="any" data-htools-favicon="ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" data-htools-favicon="svg" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <link rel="alternate" type="application/rss+xml" title="HTools RSS" href="/rss.xml" />
    <link rel="alternate" type="application/feed+json" title="HTools JSON Feed" href="/rss.json" />
    <script>
      (() => {
        try {
          const mode = localStorage.getItem("htools_theme") || "light";
          const theme =
            mode === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : mode === "dark"
                ? "dark"
                : "light";

          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          document.documentElement.style.backgroundColor =
            theme === "dark" ? "#000" : "#fff";
        } catch {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
          document.documentElement.style.backgroundColor = "#fff";
        }
      })();
    </script>
    <title>HTools</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- React 入口必须先加载 -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Twikoo 评论系统 -->
    <script src="https://cdn.jsdelivr.net/npm/twikoo@1.7.14/dist/twikoo.min.js"></script>
    <script>
      function initTwikoo() {
        if (typeof twikoo !== 'undefined' && document.getElementById('tcomment')) {
          twikoo.init({
            el: '#tcomment',
            envId: 'https://twikoo.hangdn.com'
          });
          console.log('✅ Twikoo 初始化成功');
        }
      }
      // 延迟 1.5 秒等待 React 渲染完成
      setTimeout(initTwikoo, 1500);
    </script>
  </body>
</html>
